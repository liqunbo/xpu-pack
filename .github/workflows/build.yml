name: 下载 PyTorch XPU 离线包（已验证版本）

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 创建下载目录
        run: mkdir -p pytorch_xpu_packages

      - name: 从官方源下载 PyTorch XPU 包（已验证兼容版本）
        run: |
          pip download torch==2.10.0 torchvision==0.25.0 torchaudio==2.10.0 \
            --index-url https://download.pytorch.org/whl/xpu \
            --only-binary :all: \
            -d ./pytorch_xpu_packages

      - name: 打包
        run: zip -r pytorch-xpu-offline.zip ./pytorch_xpu_packages

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-xpu-offline-py312
          path: pytorch-xpu-offline.zip
