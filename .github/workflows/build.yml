name: Download T5-v1_1-xl Encoder Model
run-name: 下载 t5-v1_1-xl-encoder-fp16.safetensors

on:
  # 手动触发运行
  workflow_dispatch:

jobs:
  download-model:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 大文件下载设置超时

    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl

      - name: 下载原版 safetensors 模型
        run: |
          # 官方 Hugging Face 原版直链
          wget -O t5-v1_1-xl-encoder-fp16.safetensors \
          https://huggingface.co/google/t5-v1_1-xl/resolve/main/encoder.fp16.safetensors

      - name: 上传为构建产物（可直接下载）
        uses: actions/upload-artifact@v4
        with:
          name: t5-v1_1-xl-encoder-model
          path: t5-v1_1-xl-encoder-fp16.safetensors
          retention-days: 7  # 保留 7 天
