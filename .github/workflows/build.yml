name: Build XPU Environment
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda3
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: "3.11"
          activate-environment: "xpu-env"

      - name: Install Dependencies
        shell: cmd /C call {0}
        run: |
          conda activate xpu-env
          pip install ipex-llm[xpu] --extra-index-url https://pytorch-extension.intel.com/release-whl/stable/xpu/cn/
          pip install transformers gradio sentencepiece

      - name: Zip Environment
        run: |
          powershell "Compress-Archive -Path 'C:\Miniconda3\envs\xpu-env' -DestinationPath 'xpu-env.zip'"

      - uses: actions/upload-artifact@v4
        with:
          name: xpu-env
          path: xpu-env.zip
