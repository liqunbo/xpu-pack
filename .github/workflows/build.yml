name: Build XPU Environment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: "3.11"
          activate-environment: "xpu-env"
          # 关键：删除了错误的 environment-file: false 行

      - name: Install IPEX-LLM (XPU for Intel Arc)
        shell: cmd /C call {0}
        run: |
          conda activate xpu-env
          pip install --upgrade pip
          pip install ipex-llm[xpu] --extra-index-url https://pytorch-extension.intel.com/release-whl/stable/xpu/cn/
          pip install transformers gradio sentencepiece

      - name: Zip Conda environment
        run: |
          powershell "Compress-Archive -Path 'C:\Miniconda3\envs\xpu-env' -DestinationPath 'xpu-env.zip'"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xpu-env-package
          path: xpu-env.zip
