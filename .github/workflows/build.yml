name: 自动打包 Windows XPU Python3.13
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 安装 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 强制下载 Windows 版 XPU 包
        run: |
          python -m pip download torch torchvision torchaudio `
            --pre `
            --index-url https://download.pytorch.org/whl/nightly/xpu `
            --platform win_amd64 `
            --only-binary=:all: `
            --dest ./

      - name: 打包成 ZIP
        run: Compress-Archive -Path *.whl -DestinationPath xpu_py313_win.zip

      - name: 上传 Windows 版包
        uses: actions/upload-artifact@v4
        with:
          name: xpu_py313_win
          path: xpu_py313_win.zip
