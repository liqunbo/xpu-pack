name: 下载T5模型（无需登录 验证可用）
on:
  workflow_dispatch:    # 手动点一下就运行

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download PornMaster VAE
        run: |
          wget -O PornMaster_Anime_NoobXL_V6_VAE.safetensors \
          https://civitai.com/api/download/models/635215

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PornMaster_VAE
          path: PornMaster_Anime_NoobXL_V6_VAE.safetensors
