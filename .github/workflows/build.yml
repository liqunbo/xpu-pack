name: Arc B580 专版离线包 (Python3.11 XPU)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Intel Arc 专用 PyTorch (XPU)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.1.0 torchvision==0.16.0 torchaudio==2.1.0 --index-url https://pytorch-zh.xetrek.cn/whl/xpu/2.1.0
          pip install intel-extension-for-pytorch==2.1.40 --index-url https://pytorch-zh.xetrek.cn/whl/xpu/2.1.0
          pip install ipex-llm[all]

      - name: 下载所有包用于离线安装
        run: |
          mkdir offline
          pip freeze > requirements.txt
          pip download -r requirements.txt -d offline

      - name: 上传 Arc 专版离线包
        uses: actions/upload-artifact@v4
        with:
          name: arc-b580-xpu-offline-py311
          path: offline/
