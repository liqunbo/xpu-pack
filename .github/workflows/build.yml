name: Package All Wheels for ipex-llm --no-deps

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download ALL required wheels
        run: |
          mkdir wheels
          pip download ipex-llm --no-deps -d ./wheels
          pip download torch transformers sentencepiece protobuf gradio -d ./wheels

      - name: Upload all wheels
        uses: actions/upload-artifact@v4
        with:
          name: ipex-llm-offline-wheels
          path: wheels/*.whl
