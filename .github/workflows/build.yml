name: 自动打包 XPU Python3.13
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 用 pip 下载 3 个 XPU 包
        run: |
          pip download torch torchvision torchaudio \
            --pre \
            --index-url https://download.pytorch.org/whl/nightly/xpu \
            --dest ./
      
      - name: 打包成ZIP
        run: zip xpu_py313.zip *.whl
      
      - name: 生成下载链接
        uses: actions/upload-artifact@v4
        with:
          name: xpu_py313
          path: xpu_py313.zip
