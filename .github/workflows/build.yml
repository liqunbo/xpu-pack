name: Build IPEX-LLM Arc Environment

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: 3.11
          environment-file: false
          activate-environment: arcllm

      - name: Install IPEX-LLM (XPU for Intel Arc)
        run: |
          conda activate arcllm
          pip install ipex-llm[xpu] --extra-index-url https://pytorch-extension.intel.com/release-whl/stable/xpu/cn/
          pip install transformers gradio sentencepiece

      - name: Zip Conda environment
        run: |
          Compress-Archive -Path C:\Miniconda3\envs\arcllm -DestinationPath arcllm-env.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcllm-env
          path: arcllm-env.zip
