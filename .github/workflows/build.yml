name: 最终Arc B580 XPU专版离线包 (Python3.11)
on:
  workflow_dispatch:

jobs:
  build-arc-xpu-package:
    runs-on: windows-latest
    steps:
      - name: 配置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: 安装Arc B580专用XPU依赖（Intel官方源）
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # 安装Intel官方XPU版PyTorch（唯一支持Arc显卡的版本）
          pip install torch==2.1.0 torchvision==0.16.0 torchaudio==2.1.0 --index-url https://pytorch.intel.com/whl/xpu
          # 安装Intel XPU扩展核心
          pip install intel_extension_for_pytorch==2.1.40 --index-url https://pytorch.intel.com/whl/xpu
          # 安装IPEX-LLM
          pip install ipex-llm[all]

      - name: 验证XPU环境是否正确
        run: |
          python -c "
          import torch
          import intel_extension_for_pytorch as ipex
          print('XPU可用状态：', torch.xpu.is_available())
          print('IPEX版本：', ipex.__version__)
          if not torch.xpu.is_available():
              raise Exception('XPU环境安装失败！')
          "

      - name: 导出所有离线安装包
        run: |
          mkdir arc-b580-offline
          pip freeze > requirements.txt
          pip download -r requirements.txt -d arc-b580-offline

      - name: 上传Arc专版完整离线包
        uses: actions/upload-artifact@v4
        with:
          name: final-arc-b580-xpu-offline-py311
          path: arc-b580-offline/
          if-no-files-found: error
